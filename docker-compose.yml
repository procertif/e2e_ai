services:
  e2e:
    build: .
    init: true
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY:-:0}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./backend:/app/backend
      - ./playwright.config.ts:/app/playwright.config.ts
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./data:/app/data
      - ./.env:/app/.env
      - /home/procertif/www:/home/procertif/www:ro
      - ${HOME}/.claude:/root/.claude:ro
