<!-- ── Results Modal ── -->
<div id="results-modal" class="results-overlay" style="display:none">

    <div class="results-dialog-header">
      <h2 class="results-title">Résultats de la session</h2>
      <button class="results-close-btn" id="results-close" aria-label="Fermer">×</button>
    </div>
    <div class="results-dialog-body" id="results-body"></div>
    <div class="results-dialog-footer">
      <a class="btn btn-outline-secondary btn-sm" id="results-all-screenshots-btn" href="#" style="display:none;" target="_blank">Voir tous les screenshots</a>
      <a class="btn btn-outline-danger btn-sm" id="results-screenshots-btn" href="#" style="display:none;" target="_blank">Voir les screenshots des échecs</a>
      <button class="btn btn-primary btn-sm" id="results-close-btn">Fermer</button>
    </div>
  </div>
</div>

<script>
  const GROUP_COLORS = [
    { bg: '#dbeafe', text: '#1d4ed8' },
    { bg: '#dcfce7', text: '#15803d' },
    { bg: '#fef3c7', text: '#b45309' },
    { bg: '#fce7f3', text: '#be185d' },
    { bg: '#e0e7ff', text: '#4338ca' },
    { bg: '#ffedd5', text: '#c2410c' },
    { bg: '#f0fdfa', text: '#0f766e' },
    { bg: '#fdf4ff', text: '#7e22ce' },
  ];

  const state = {};
  const outputMap = {}; // filename -> accumulated stripped output
  let allTests = [];
  let allGroups = [];
  let activeTab = 'tests';
  const queue = [];
  const queueSet = new Set();

  function formatDuration(ms) {
    if (!ms) return null;
    const s = Math.round(ms / 1000);
    if (s < 60) return s + 's';
    const m = Math.floor(s / 60);
    const r = s % 60;
    return r > 0 ? `${m}m ${r}s` : `${m}m`;
  }

  function escHtml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function stripAnsi(str) {
    return str.replace(/\x1B\[[0-9;]*[a-zA-Z]/g, '');
  }

  function cardId(filename) {
    return 'card-' + filename.replace(/[^a-zA-Z0-9]/g, '-');
  }

  function badgeClass(type) {
    const map = { quiz: 'badge-quiz', jury: 'badge-jury', correction: 'badge-correction', validation: 'badge-validation', signature: 'badge-signature' };
    return map[type] || 'badge-quiz';
  }

  // ── Available panel ──

  function renderAvailable(query) {
    const list = document.getElementById('available-list');
    const q = query.toLowerCase().trim();
    const queryTokens = q.split(/\s+/).filter(Boolean);
    const filtered = queryTokens.length === 0
      ? allTests
      : allTests.filter(t => {
          const nameTokens = t.name.toLowerCase().split(/[\s\-]+/).filter(Boolean);
          return queryTokens.every(qt => nameTokens.some(nt => nt.includes(qt)));
        });

    document.getElementById('avail-count').textContent =
      filtered.length !== allTests.length ? `${filtered.length}/${allTests.length} tests` : `${allTests.length} tests`;

    list.innerHTML = filtered.map(t => {
      const isQueued = queueSet.has(t.filename);
      return `
        <div class="avail-item${isQueued ? ' is-queued' : ''}" data-filename="${t.filename}">
          <div class="avail-item-info">
            <p class="test-name">${t.name}</p>
            <span class="badge-type ${badgeClass(t.type)}">${t.typeLabel}</span>
          </div>
          ${isQueued
            ? `<button class="btn-remove-avail" data-filename="${t.filename}" title="Retirer de la file">×</button>`
            : `<button class="btn-add-queue" data-filename="${t.filename}" title="Ajouter à la file">+</button>`
          }
        </div>`;
    }).join('');

    for (const btn of list.querySelectorAll('.btn-add-queue')) {
      btn.addEventListener('click', () => {
        const test = allTests.find(t => t.filename === btn.dataset.filename);
        if (test) addToQueue(test);
      });
    }
    for (const btn of list.querySelectorAll('.btn-remove-avail')) {
      btn.addEventListener('click', () => removeFromQueue(btn.dataset.filename));
    }
  }

  // ── Queue panel ──

  function addToQueue(test) {
    if (queueSet.has(test.filename)) return;
    queue.push(test);
    queueSet.add(test.filename);
    state[test.filename] = 'idle';

    document.getElementById('queue-empty').style.display = 'none';
    document.getElementById('queue-list').appendChild(buildQueueCard(test));
    updateQueueCount();
    persistQueue();
    renderActiveTab();
  }

  function removeFromQueue(filename) {
    if (state[filename] === 'running') return;
    const idx = queue.findIndex(t => t.filename === filename);
    if (idx === -1) return;
    queue.splice(idx, 1);
    queueSet.delete(filename);
    delete state[filename];

    const card = document.getElementById(cardId(filename));
    if (card) card.remove();

    if (queue.length === 0) {
      document.getElementById('queue-empty').style.display = '';
    }
    updateQueueCount();
    persistQueue();
    renderActiveTab();
  }

  function updateEstBadge(filename, ms) {
    const card = document.getElementById(cardId(filename));
    if (!card) return;
    const badges = card.querySelector('.test-badges');
    if (!badges) return;
    let badge = badges.querySelector('.badge-est');
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'badge-est';
      badges.appendChild(badge);
    }
    badge.textContent = `~${formatDuration(ms)}`;
  }

  function updateQueueCount() {
    const n = queue.length;
    const totalMs = queue.reduce((a, t) => a + (t.estimatedMs || 0), 0);
    const knownCount = queue.filter(t => t.estimatedMs).length;
    let label = n === 0 ? '0 test' : `${n} test${n > 1 ? 's' : ''}`;
    if (totalMs > 0) {
      const partial = knownCount < n ? ' partiel' : '';
      label += ` · ~${formatDuration(totalMs)}${partial}`;
    }
    document.getElementById('queue-count').textContent = label;
  }

  function renderActiveTab() {
    const q = document.getElementById('search-available').value.trim();
    if (activeTab === 'groups') renderGroupsForQueue(q);
    else renderAvailable(q);
  }

  function persistQueue() {
    localStorage.setItem('e2e_queue', JSON.stringify(queue.map(t => t.filename)));
  }

  function syncQueueOrder() {
    const list = document.getElementById('queue-list');
    const cards = [...list.querySelectorAll('.test-card[data-filename]')];
    const newOrder = cards.map(c => queue.find(t => t.filename === c.dataset.filename)).filter(Boolean);
    queue.length = 0;
    queue.push(...newOrder);
    persistQueue();
  }

  function buildQueueCard(test) {
    const card = document.createElement('div');
    card.className = 'test-card';
    card.id = cardId(test.filename);
    card.dataset.filename = test.filename;
    card.draggable = true;

    card.innerHTML = `
      <div class="test-card-body">
        <div class="test-card-top">
          <div class="d-flex align-items-center gap-3">
            <span class="drag-handle" title="Glisser pour réordonner">⠿</span>
            <div>
              <p class="test-name">${test.name}</p>
              <div class="test-badges">
                <span class="badge-type ${badgeClass(test.type)}">${test.typeLabel}</span>
                ${test.estimatedMs ? `<span class="badge-est">~${formatDuration(test.estimatedMs)}</span>` : ''}
              </div>
            </div>
          </div>
          <div class="test-actions">
            <span class="status-pill status-idle" style="display:none;">Prêt</span>
            <button class="btn btn-primary btn-sm btn-run">Lancer</button>
            <button class="btn-remove-queue" title="Retirer de la file">×</button>
          </div>
        </div>
      </div>
      <div class="output-area">
        <pre class="output-pre"></pre>
      </div>
    `;

    card.querySelector('.btn-run').addEventListener('click', () => runTest(test));
    card.querySelector('.btn-remove-queue').addEventListener('click', () => removeFromQueue(test.filename));

    card.addEventListener('dragstart', (e) => {
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => card.classList.add('is-dragging'), 0);
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('is-dragging');
      syncQueueOrder();
    });

    return card;
  }

  // ── Card status / output ──

  function setCardStatus(filename, status) {
    const card = document.getElementById(cardId(filename));
    if (!card) return;

    card.className = 'test-card' + (status !== 'idle' ? ' is-' + status : '');
    card.draggable = true;

    const pill = card.querySelector('.status-pill');
    const btn  = card.querySelector('.btn-run');

    pill.className = 'status-pill status-' + status;
    const labels = { idle: 'Prêt', running: 'En cours…', passed: 'Réussi ✓', failed: 'Échoué ✗' };
    pill.textContent = labels[status] || status;
    pill.style.display = status === 'idle' ? 'none' : '';

    if (status === 'running') {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-xs" role="status"></span>';
    } else {
      btn.disabled = false;
      btn.textContent = 'Lancer';
    }
  }

  function appendOutput(filename, text) {
    const card = document.getElementById(cardId(filename));
    if (!card) return;
    const area = card.querySelector('.output-area');
    const pre  = card.querySelector('.output-pre');
    area.classList.add('visible');
    pre.textContent += stripAnsi(text);
    pre.scrollTop = pre.scrollHeight;
  }

  function clearOutput(filename) {
    const card = document.getElementById(cardId(filename));
    if (!card) return;
    const pre = card.querySelector('.output-pre');
    pre.textContent = '';
  }

  // ── Run logic ──

  function runTest(test) {
    if (state[test.filename] === 'running') return Promise.resolve();
    state[test.filename] = 'running';
    clearOutput(test.filename);
    setCardStatus(test.filename, 'running');

    return new Promise(async (resolve) => {
      const folder = test.filename.replace(/^\d+-/, '').replace(/\.spec\.ts$/, '');
      await fetch('/api/screenshots/' + encodeURIComponent(folder), { method: 'DELETE' }).catch(() => {});

      let runId;
      try {
        const res = await fetch('/api/run/' + encodeURIComponent(test.filename), { method: 'POST' });
        const data = await res.json();
        runId = data.runId;
      } catch (e) {
        appendOutput(test.filename, 'Erreur: impossible de lancer le test.\n');
        state[test.filename] = 'failed';
        setCardStatus(test.filename, 'failed');
        resolve();
        return;
      }

      outputMap[test.filename] = '';
      const es = new EventSource('/api/stream/' + runId);
      es.onmessage = (evt) => {
        const msg = JSON.parse(evt.data);
        if (msg.text) {
          appendOutput(test.filename, msg.text);
          outputMap[test.filename] += stripAnsi(msg.text);
        }
        if (msg.done) {
          state[test.filename] = msg.status;
          setCardStatus(test.filename, msg.status);
          if (msg.estimatedMs != null) {
            const t = allTests.find(t => t.filename === test.filename);
            if (t) t.estimatedMs = msg.estimatedMs;
            const q = queue.find(t => t.filename === test.filename);
            if (q) q.estimatedMs = msg.estimatedMs;
            updateEstBadge(test.filename, msg.estimatedMs);
            updateQueueCount();
          }
          es.close();
          resolve();
        }
      };
      es.onerror = () => {
        state[test.filename] = 'failed';
        setCardStatus(test.filename, 'failed');
        es.close();
        resolve();
      };
    });
  }

  // ── Results modal ──

  async function showResultsModal(sessionTests, elapsedMs) {
    const launched = sessionTests.length;
    const passed   = sessionTests.filter(t => state[t.filename] === 'passed').length;
    const failed   = sessionTests.filter(t => state[t.filename] === 'failed').length;

    const totalSec = elapsedMs / 1000;
    const minutes  = Math.floor(totalSec / 60);
    const secs     = (totalSec % 60).toFixed(0).padStart(2, '0');
    const timeStr  = minutes > 0 ? `${minutes}m ${secs}s` : `${totalSec.toFixed(1)}s`;

    const failedTests = sessionTests.filter(t => state[t.filename] === 'failed');

    const toFolder = t => t.filename.replace(/^\d+-/, '').replace(/\.spec\.ts$/, '');
    await fetch('/api/session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        all: sessionTests.map(toFolder),
        failed: failedTests.map(toFolder),
      }),
    }).catch(() => {});

    const screenshotsBtn = document.getElementById('results-screenshots-btn');
    screenshotsBtn.href = '/screenshots?f=failed';
    screenshotsBtn.style.display = failedTests.length > 0 ? '' : 'none';

    const allScreenshotsBtn = document.getElementById('results-all-screenshots-btn');
    allScreenshotsBtn.href = '/screenshots?f=all';
    allScreenshotsBtn.style.display = sessionTests.length > 0 ? '' : 'none';

    async function findFailingAction(t) {
      const output = outputMap[t.filename] || '';
      // Prefer "at …" stack frame lines; fall back to any spec reference
      const atMatches = [...output.matchAll(/at [^\n]*\.spec\.ts:(\d+)/g)];
      const allMatches = [...output.matchAll(/\.spec\.ts:(\d+)/g)];
      const matches = atMatches.length ? atMatches : allMatches;
      if (!matches.length) return null;
      // last occurrence = deepest stack frame in the test file
      const failLine = parseInt(matches[matches.length - 1][1]);
      const testKey = t.filename.replace(/\.spec\.ts$/, '');
      try {
        const res = await fetch(`/api/actions/${encodeURIComponent(testKey)}`);
        if (!res.ok) return null;
        const data = await res.json();
        // action with highest line number still ≤ the failing line
        const candidates = data.actions.filter(a => a.line <= failLine);
        if (!candidates.length) return null;
        const lastIdx = data.actions.indexOf(candidates[candidates.length - 1]);
        return data.actions[lastIdx + 1] ?? data.actions[lastIdx];
      } catch { return null; }
    }

    let failuresHtml = '';
    if (failedTests.length > 0) {
      const label = failedTests.length > 1 ? 'tests échoués' : 'test échoué';
      failuresHtml = `<div class="results-failures-title">${failedTests.length} ${label}</div>`;
      const failingActions = await Promise.all(failedTests.map(findFailingAction));
      for (let i = 0; i < failedTests.length; i++) {
        const t = failedTests[i];
        const a = failingActions[i];
        const actionHtml = a
          ? `<div class="results-failure-action">Étape <strong>${a.index}</strong> — ${escHtml(a.description)}</div>`
          : '';
        failuresHtml += `
          <div class="results-failure-item">
            <div class="results-failure-name">${escHtml(t.name)}</div>
            ${actionHtml}
          </div>`;
      }
    } else {
      failuresHtml = `<div class="results-all-passed">Tous les tests ont réussi ✓</div>`;
    }

    document.getElementById('results-body').innerHTML = `
      <div class="results-stats-grid">
        <div class="results-stat-card is-neutral">
          <div class="stat-val">${launched}</div>
          <div class="stat-lbl">Lancés</div>
        </div>
        <div class="results-stat-card is-success">
          <div class="stat-val">${passed}</div>
          <div class="stat-lbl">Réussis</div>
        </div>
        <div class="results-stat-card is-danger">
          <div class="stat-val">${failed}</div>
          <div class="stat-lbl">Échoués</div>
        </div>
        <div class="results-stat-card is-time">
          <div class="stat-val">${timeStr}</div>
          <div class="stat-lbl">Durée totale</div>
        </div>
      </div>
      ${failuresHtml}
    `;

    document.getElementById('results-modal').style.display = 'flex';
  }

  // ── Drag & Drop (queue only) ──

  function getDragAfterElement(container, y) {
    const cards = [...container.querySelectorAll('.test-card:not(.is-dragging)')];
    return cards.reduce((closest, child) => {
      const box = child.getBoundingClientRect();
      const offset = y - box.top - box.height / 2;
      if (offset < 0 && offset > closest.offset) {
        return { offset, element: child };
      }
      return closest;
    }, { offset: Number.NEGATIVE_INFINITY }).element;
  }

  function makeDraggable(container) {
    container.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const dragging = document.querySelector('.is-dragging');
      if (!dragging) return;
      const afterEl = getDragAfterElement(container, e.clientY);
      if (afterEl == null) {
        container.appendChild(dragging);
      } else {
        container.insertBefore(dragging, afterEl);
      }
    });
  }

  // ── Groups tab ──

  function renderGroupsForQueue(query) {
    const list = document.getElementById('groups-for-queue');
    const q = query.toLowerCase().trim();
    const filtered = q
      ? allGroups.filter(g => g.name.toLowerCase().includes(q))
      : allGroups;

    const n = allGroups.length;
    document.getElementById('avail-count').textContent =
      filtered.length !== n ? `${filtered.length}/${n} groupes` : `${n} groupe${n !== 1 ? 's' : ''}`;

    if (allGroups.length === 0) {
      list.innerHTML = `
        <div class="groups-tab-empty">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16" style="opacity:0.25;">
            <path d="M.5 3l.04.87a1.99 1.99 0 0 0-.342 1.311l.637 7A2 2 0 0 0 2.826 14h10.348a2 2 0 0 0 1.991-1.819l.637-7A2 2 0 0 0 13.81 3H9.828a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 6.172 1H2.5a2 2 0 0 0-2 2zm5.672-1a1 1 0 0 1 .707.293L7.586 3H2.19c-.24 0-.47.042-.683.12L1.5 2.98a1 1 0 0 1 1-.98h3.672z"/>
          </svg>
          <p>Aucun groupe créé.</p>
          <a href="/groups">Gérer les groupes</a>
        </div>`;
      return;
    }

    if (filtered.length === 0) {
      list.innerHTML = `<div class="groups-tab-empty"><p>Aucun groupe correspondant.</p></div>`;
      return;
    }

    list.innerHTML = filtered.map((g, i) => {
      const realIdx = allGroups.indexOf(g);
      const col = GROUP_COLORS[realIdx % GROUP_COLORS.length];
      const knownTests = g.tests.filter(fn => allTests.some(t => t.filename === fn));
      const alreadyQueued = knownTests.filter(fn => queueSet.has(fn)).length;
      const addable = knownTests.length - alreadyQueued;
      return `
        <div class="group-queue-item">
          <div class="group-queue-info">
            <span class="group-queue-dot" style="background:${col.text};"></span>
            <div class="group-queue-text">
              <p class="group-queue-name">${escHtml(g.name)}</p>
              <span class="group-queue-meta">${knownTests.length} test${knownTests.length !== 1 ? 's' : ''}${alreadyQueued > 0 ? ` · ${alreadyQueued} déjà en file` : ''}</span>
            </div>
          </div>
          <button class="btn-add-group-queue" data-group-id="${escHtml(g.id)}" ${addable === 0 ? 'disabled style="opacity:0.4;cursor:default;"' : ''}>
            ${addable === 0 ? 'Tout ajouté' : 'Ajouter tout'}
          </button>
        </div>`;
    }).join('');

    for (const btn of list.querySelectorAll('.btn-add-group-queue:not([disabled])')) {
      btn.addEventListener('click', () => addGroupToQueue(btn.dataset.groupId));
    }
  }

  function addGroupToQueue(groupId) {
    const group = allGroups.find(g => g.id === groupId);
    if (!group) return;
    for (const fn of group.tests) {
      const test = allTests.find(t => t.filename === fn);
      if (test && !queueSet.has(fn)) addToQueue(test);
    }
    renderGroupsForQueue(document.getElementById('search-available').value.trim());
  }

  async function switchTab(tab) {
    activeTab = tab;
    document.getElementById('tab-btn-tests').classList.toggle('active', tab === 'tests');
    document.getElementById('tab-btn-groups').classList.toggle('active', tab === 'groups');
    document.getElementById('available-list').style.display = tab === 'tests' ? '' : 'none';
    document.getElementById('groups-for-queue').style.display = tab === 'groups' ? '' : 'none';
    const q = document.getElementById('search-available').value.trim();
    if (tab === 'groups') {
      allGroups = await fetch('/api/groups').then(r => r.json());
      renderGroupsForQueue(q);
    } else {
      renderAvailable(q);
    }
  }

  // ── Fake tests for layout preview ──

  function generateFakeTests(count) {
    const types = ['quiz', 'jury', 'correction', 'validation', 'signature'];
    return Array.from({ length: count }, (_, i) => {
      const type = types[i % types.length];
      const cas  = i + 1;
      return {
        filename: `99-cas${cas}-${type}.spec.ts`,
        cas: `cas${cas}`,
        casNum: cas,
        type,
        typeLabel: type.charAt(0).toUpperCase() + type.slice(1),
        name: `[FICTIF] Cas ${cas} - ${type.charAt(0).toUpperCase() + type.slice(1)}`,
        _fake: true,
      };
    });
  }

  // ── Init ──

  async function init() {
    const [tests, grps] = await Promise.all([
      fetch('/api/tests').then(r => r.json()),
      fetch('/api/groups').then(r => r.json()),
    ]);
    allTests = [...tests];
    //allTests = [...tests, ...generateFakeTests(100)];
    allGroups = grps;

    const savedQueue = JSON.parse(localStorage.getItem('e2e_queue') || '[]');
    for (const filename of savedQueue) {
      const test = allTests.find(t => t.filename === filename);
      if (test) addToQueue(test);
    }

    renderAvailable('');

    document.getElementById('tab-btn-tests').addEventListener('click', () => switchTab('tests'));
    document.getElementById('tab-btn-groups').addEventListener('click', () => switchTab('groups'));

    document.getElementById('search-available').addEventListener('input', (e) => {
      const q = e.target.value.trim();
      if (activeTab === 'tests') renderAvailable(q);
      else renderGroupsForQueue(q);
    });

    makeDraggable(document.getElementById('queue-list'));

    document.getElementById('btn-run-queue').addEventListener('click', async () => {
      const sessionTests = [...queue];
      if (sessionTests.length === 0) return;
      const startTime = Date.now();
      for (const t of sessionTests) {
        await runTest(t);
      }
      showResultsModal(sessionTests, Date.now() - startTime);
    });

    const closeModal = () => { document.getElementById('results-modal').style.display = 'none'; };
    document.getElementById('results-close').addEventListener('click', closeModal);
    document.getElementById('results-close-btn').addEventListener('click', closeModal);
    document.getElementById('results-modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('results-modal')) closeModal();
    });
  }

  init();
</script>
