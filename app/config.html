<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procertif — Configuration</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/index.css" />
  <script src="/i18n.js"></script>
  <style>
    .config-section {
      background: #fff;
      border: 1px solid #e9ecef;
      border-radius: 0.75rem;
      overflow: hidden;
      max-width: 760px;
    }
    .config-section-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #e9ecef;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .config-section-title {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #495057;
      margin: 0;
    }
    .config-section-body {
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .config-row {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .config-label {
      font-size: 0.905rem;
      font-weight: 600;
      color: #212529;
      margin: 0;
    }
    .config-desc {
      font-size: 0.8rem;
      color: #6c757d;
      margin: 0 0 0.3rem;
    }
    .config-input {
      font-family: "Fira Mono", "Consolas", monospace;
      font-size: 0.9rem;
      padding: 0.45rem 0.75rem;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      outline: none;
      color: #212529;
      background: #f8f9fa;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      width: 100%;
    }
    .config-input:focus {
      border-color: #86b7fe;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.1);
    }
    .config-divider {
      border: none;
      border-top: 1px solid #f1f3f5;
      margin: 0;
    }
    .custom-vars-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .custom-vars-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #adb5bd;
    }
    .custom-var-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .custom-var-row .config-input-key {
      flex: 0 0 200px;
    }
    .custom-var-row .config-input-val {
      flex: 1;
    }
    .btn-remove-var {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1.5px solid #dc3545;
      background: none;
      color: #dc3545;
      font-size: 1.1rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
    }
    .btn-remove-var:hover { background: #dc3545; color: #fff; }
    .config-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid #e9ecef;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .save-status {
      font-size: 0.875rem;
    }
    .save-status.success { color: #198754; }
    .save-status.error   { color: #dc3545; }
    .badge-warning {
      font-size: 0.72rem;
      background: #fff3cd;
      color: #856404;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      font-weight: 500;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <!-- ── Main ── -->
  <div class="app-main">

    <div class="app-topbar">
      <h1 data-i18n="config_page_title">Configuration</h1>
      <span class="badge-env">.ENV</span>
    </div>

    <div class="app-content" style="overflow-y: auto; display: block;">

      <div class="config-section">
        <div class="config-section-header">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="#6c757d" viewBox="0 0 16 16">
            <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.892 3.433-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.892-1.64-.901-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52z"/>
          </svg>
          <h2 class="config-section-title" data-i18n="config_section_title">Variables d'environnement</h2>
        </div>

        <div class="config-section-body" id="known-vars">
          <!-- known vars injected by JS -->
        </div>

        <hr class="config-divider" />

        <div class="config-section-body" id="custom-vars-wrapper">
          <div class="custom-vars-header">
            <span class="custom-vars-title" data-i18n="config_custom_vars_title">Variables personnalisées</span>
            <button class="btn btn-sm btn-outline-primary" id="btn-add-var" type="button" data-i18n="btn_add_var">+ Ajouter</button>
          </div>
          <div id="custom-vars-list">
            <!-- custom rows injected by JS -->
          </div>
        </div>

        <div class="config-footer">
          <button class="btn btn-primary btn-sm" id="btn-save" type="button" data-i18n="btn_save_config">Sauvegarder</button>
          <span class="save-status" id="save-status"></span>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// i18n key → env var key mapping for KNOWN vars
const KNOWN = [
  { key: "BASE_URL",            labelKey: "known_var_base_url_label",       descKey: "known_var_base_url_desc" },
  { key: "TEST_OTP",            labelKey: "known_var_otp_label",            descKey: "known_var_otp_desc" },
  { key: "PORT",                labelKey: "known_var_port_label",           descKey: "known_var_port_desc",           warning: true },
  { key: "ANTHROPIC_CLIENT_ID", labelKey: "known_var_anthropic_id_label",   descKey: "known_var_anthropic_id_desc" },
  { key: "ANTHROPIC_MODEL",     labelKey: "known_var_anthropic_model_label", descKey: "known_var_anthropic_model_desc" },
  { key: "LANG",                labelKey: "known_var_lang_label",           descKey: "known_var_lang_desc",
    type: "select", optKeys: [["en", "known_var_lang_opt_en"], ["fr", "known_var_lang_opt_fr"]] },
];

let customVars = [];

async function load() {
  const T = window.t || (k => k);
  const res = await fetch("/api/config");
  const env = await res.json();

  const knownKeys = new Set(KNOWN.map(v => v.key));
  const knownContainer = document.getElementById("known-vars");
  knownContainer.innerHTML = "";

  for (const v of KNOWN) {
    const val = env[v.key] ?? "";
    const row = document.createElement("div");
    row.className = "config-row";
    let inputHtml;
    if (v.type === "select") {
      const opts = v.optKeys.map(([optVal, optKey]) =>
        `<option value="${optVal}"${val === optVal || (!val && optVal === "en") ? " selected" : ""}>${escHtml(T(optKey))}</option>`
      ).join("");
      inputHtml = `<select class="config-input" data-key="${v.key}">${opts}</select>`;
    } else {
      inputHtml = `<input type="text" class="config-input" data-key="${v.key}" value="${escHtml(val)}" />`;
    }
    row.innerHTML = `
      <p class="config-label">
        ${T(v.labelKey)}
        ${v.warning ? `<span class="badge-warning">${T('restart_required_badge')}</span>` : ""}
      </p>
      <p class="config-desc">${T(v.descKey)}</p>
      ${inputHtml}
    `;
    knownContainer.appendChild(row);
  }

  customVars = Object.entries(env)
    .filter(([k]) => !knownKeys.has(k))
    .map(([k, v]) => ({ k, v }));

  renderCustomVars();
}

function renderCustomVars() {
  const T = window.t || (k => k);
  const list = document.getElementById("custom-vars-list");
  list.innerHTML = "";
  customVars.forEach((item, idx) => {
    const row = document.createElement("div");
    row.className = "custom-var-row";
    row.innerHTML = `
      <input type="text" class="config-input config-input-key" placeholder="${T('config_var_key_placeholder')}" value="${escHtml(item.k)}" data-idx="${idx}" data-part="k" />
      <input type="text" class="config-input config-input-val" placeholder="${T('config_var_val_placeholder')}" value="${escHtml(item.v)}" data-idx="${idx}" data-part="v" />
      <button class="btn-remove-var" data-idx="${idx}" title="${T('btn_remove_var_title')}">×</button>
    `;
    list.appendChild(row);
  });

  list.querySelectorAll("input").forEach(inp => {
    inp.addEventListener("input", () => {
      const idx = Number(inp.dataset.idx);
      customVars[idx][inp.dataset.part] = inp.value;
    });
  });
  list.querySelectorAll(".btn-remove-var").forEach(btn => {
    btn.addEventListener("click", () => {
      customVars.splice(Number(btn.dataset.idx), 1);
      renderCustomVars();
    });
  });
}

document.getElementById("btn-add-var").addEventListener("click", () => {
  customVars.push({ k: "", v: "" });
  renderCustomVars();
  const inputs = document.querySelectorAll("#custom-vars-list .config-input-key");
  if (inputs.length) inputs[inputs.length - 1].focus();
});

document.getElementById("btn-save").addEventListener("click", async () => {
  const T = window.t || (k => k);
  const status = document.getElementById("save-status");
  const btn = document.getElementById("btn-save");
  btn.disabled = true;
  status.textContent = "";
  status.className = "save-status";

  const data = {};
  document.querySelectorAll("#known-vars input[data-key]").forEach(inp => {
    if (inp.value.trim() !== "") data[inp.dataset.key] = inp.value.trim();
  });
  for (const { k, v } of customVars) {
    if (k.trim()) data[k.trim()] = v;
  }

  try {
    const res = await fetch("/api/config", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });
    if (res.ok) {
      status.textContent = T('config_saved');
      status.className = "save-status success";
      const langEl = document.querySelector('#known-vars [data-key="LANG"]');
      if (langEl && langEl.value !== window._lang) {
        setTimeout(() => window.location.reload(), 800);
      }
    } else {
      status.textContent = T('config_save_error');
      status.className = "save-status error";
    }
  } catch {
    status.textContent = T('config_network_error');
    status.className = "save-status error";
  }
  btn.disabled = false;
  setTimeout(() => { status.textContent = ""; status.className = "save-status"; }, 3000);
});

function escHtml(s) {
  return String(s).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

document.addEventListener('i18nLoaded', load);
</script>
</body>
