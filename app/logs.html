  <!-- ── Main ── -->
  <div class="app-main">

    <div class="app-topbar">
      <h1 data-i18n="logs_page_title">Logs Chat</h1>
      <span class="badge-env">SESSIONS</span>
    </div>

    <div class="app-content" style="padding:0; overflow:hidden;">
      <div class="logs-layout">

        <!-- Left: session list -->
        <div class="logs-list">
          <div class="logs-list-header" data-i18n="logs_sessions_header">Sessions</div>
          <div class="logs-list-body" id="logs-list-body">
            <div style="padding:16px;color:#9ca3af;font-size:0.8rem;" data-i18n="logs_loading">Chargement…</div>
          </div>
        </div>

        <!-- Right: detail -->
        <div class="logs-detail" id="logs-detail">
          <div class="logs-empty" data-i18n="logs_select_session">Sélectionnez une session pour voir le détail.</div>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
  let sessions = [];
  let activeFilename = null;

  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    const locale = (window._lang === 'fr') ? 'fr-FR' : 'en-US';
    return d.toLocaleDateString(locale, { day: '2-digit', month: '2-digit', year: 'numeric' })
      + ' ' + d.toLocaleTimeString(locale, { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function fmtDuration(ms) {
    if (!ms && ms !== 0) return '—';
    if (ms < 1000) return ms + ' ms';
    if (ms < 60000) return (ms / 1000).toFixed(1) + ' s';
    return Math.floor(ms / 60000) + 'm ' + Math.floor((ms % 60000) / 1000) + 's';
  }

  function fmtNum(n) {
    if (n == null) return '—';
    const locale = (window._lang === 'fr') ? 'fr-FR' : 'en-US';
    return n.toLocaleString(locale);
  }

  async function loadList() {
    try {
      sessions = await fetch('/api/chat-logs').then(r => r.json());
      renderList();
    } catch {
      document.getElementById('logs-list-body').innerHTML =
        `<div style="padding:16px;color:#dc3545;font-size:0.8rem;">${(window.t || (k => k))('logs_load_error')}</div>`;
    }
  }

  function renderList() {
    const container = document.getElementById('logs-list-body');
    if (sessions.length === 0) {
      container.innerHTML = `<div style="padding:16px;color:#9ca3af;font-size:0.8rem;">${(window.t || (k => k))('logs_no_logs')}</div>`;
      return;
    }
    container.innerHTML = sessions.map(s => {
      const t = s.totals;
      const isActive = s.filename === activeFilename;
      return `
        <div class="log-item${isActive ? ' active' : ''}" data-filename="${s.filename}">
          <div class="log-item-date">${fmtDate(s.startedAt)}</div>
          <div class="log-item-stats">
            ${t ? `
              <span class="log-stat-badge in" title="${(window.t || (k => k))('logs_stat_in_title')}">${fmtNum(t.input_tokens)} in</span>
              <span class="log-stat-badge out" title="${(window.t || (k => k))('logs_stat_out_title')}">${fmtNum(t.output_tokens)} out</span>
              ${t.cache_read_input_tokens ? `<span class="log-stat-badge cache" title="${(window.t || (k => k))('logs_stat_cache_title')}">${fmtNum(t.cache_read_input_tokens)} cache</span>` : ''}
              <span class="log-stat-badge calls" title="${(window.t || (k => k))('logs_stat_calls_title')}">${t.apiCalls} ${(window.t || (k => k))('logs_api_calls').toLowerCase()}</span>
            ` : ''}
          </div>
        </div>`;
    }).join('');

    for (const el of container.querySelectorAll('.log-item')) {
      el.addEventListener('click', () => {
        activeFilename = el.dataset.filename;
        renderList();
        loadDetail(activeFilename);
      });
    }
  }

  async function loadDetail(filename) {
    const detail = document.getElementById('logs-detail');
    detail.innerHTML = `<div class="logs-empty">${(window.t || (k => k))('logs_detail_loading')}</div>`;
    try {
      const log = await fetch(`/api/chat-logs/${encodeURIComponent(filename)}`).then(r => r.json());
      renderDetail(log);
    } catch {
      detail.innerHTML = `<div class="logs-empty" style="color:#dc3545;">${(window.t || (k => k))('logs_detail_error')}</div>`;
    }
  }

  function renderDetail(log) {
    const tok = log.totals || {};
    const detail = document.getElementById('logs-detail');
    const T = window.t || (k => k);

    // Totals
    const totalsHtml = `
      <div class="log-totals">
        <div class="log-total-card accent-in">
          <div class="ltc-value">${fmtNum(tok.input_tokens)}</div>
          <div class="ltc-label">${T('logs_tokens_in')}</div>
        </div>
        <div class="log-total-card accent-out">
          <div class="ltc-value">${fmtNum(tok.output_tokens)}</div>
          <div class="ltc-label">${T('logs_tokens_out')}</div>
        </div>
        <div class="log-total-card accent-cache-create">
          <div class="ltc-value">${fmtNum(tok.cache_creation_input_tokens)}</div>
          <div class="ltc-label">${T('logs_cache_created')}</div>
        </div>
        <div class="log-total-card accent-cache-read">
          <div class="ltc-value">${fmtNum(tok.cache_read_input_tokens)}</div>
          <div class="ltc-label">${T('logs_cache_read')}</div>
        </div>
        <div class="log-total-card accent-calls">
          <div class="ltc-value">${fmtNum(tok.apiCalls)}</div>
          <div class="ltc-label">${T('logs_api_calls')}</div>
        </div>
        <div class="log-total-card accent-tools">
          <div class="ltc-value">${fmtNum(tok.toolsCalled)}</div>
          <div class="ltc-label">${T('logs_tools_used')}</div>
        </div>
        <div class="log-total-card accent-duration">
          <div class="ltc-value">${fmtDuration(log.durationMs)}</div>
          <div class="ltc-label">${T('logs_total_duration')}</div>
        </div>
      </div>`;

    // API calls table
    const calls = log.apiCalls || [];
    const callsHtml = calls.length === 0 ? '' : `
      <div class="calls-section-title">${T('logs_api_calls_section')} (${calls.length})</div>
      <table class="calls-table">
        <thead>
          <tr>
            <th>${T('logs_col_index')}</th>
            <th>${T('logs_col_time')}</th>
            <th>${T('logs_col_duration')}</th>
            <th>${T('logs_col_input')}</th>
            <th>${T('logs_col_output')}</th>
            <th>${T('logs_col_cache_created')}</th>
            <th>${T('logs_col_cache_read')}</th>
            <th>${T('logs_col_tools')}</th>
          </tr>
        </thead>
        <tbody>
          ${calls.map(c => {
            const u = c.usage || {};
            const tools = (c.toolsCalled || []).map(tc =>
              `<span class="tool-chip">${escHtml(tc.name)}</span>`
            ).join('');
            return `<tr>
              <td>${c.index}</td>
              <td>${fmtDate(c.startedAt)}</td>
              <td>${fmtDuration(c.durationMs)}</td>
              <td>${fmtNum(u.input_tokens)}</td>
              <td>${fmtNum(u.output_tokens)}</td>
              <td>${fmtNum(u.cache_creation_input_tokens) || '—'}</td>
              <td>${fmtNum(u.cache_read_input_tokens) || '—'}</td>
              <td>${tools || '—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;

    // Messages
    const messages = log.messages || [];
    const msgsHtml = messages.length === 0 ? '' : `
      <div class="messages-section-title">${T('logs_messages_section')} (${messages.length})</div>
      ${messages.map(m => renderMessage(m)).join('')}`;

    detail.innerHTML = totalsHtml + callsHtml + msgsHtml;
  }

  function renderMessage(msg) {
    const T = window.t || (k => k);
    const roleClass = msg.role === 'user' ? 'role-user' : 'role-assistant';
    const roleLabel = msg.role === 'user' ? T('logs_role_user') : T('logs_role_assistant');
    const content = renderContent(msg.content);
    return `<div class="msg-block ${roleClass}">
      <div class="msg-role-label">${roleLabel}</div>
      ${content}
    </div>`;
  }

  function renderContent(content) {
    const T = window.t || (k => k);
    if (typeof content === 'string') {
      return `<div class="msg-content-text">${escHtml(content)}</div>`;
    }
    if (!Array.isArray(content)) return '';
    return content.map(block => {
      if (block.type === 'text') {
        return `<div class="msg-content-text">${escHtml(block.text || '')}</div>`;
      }
      if (block.type === 'image') {
        return `<div class="msg-image-placeholder">[Image: ${escHtml(block.media_type || 'image')}]</div>`;
      }
      if (block.type === 'tool_use') {
        const inputStr = JSON.stringify(block.input || {}, null, 2);
        return `<div class="msg-tool-use"><strong>${escHtml(block.name)}</strong><br><pre style="margin:4px 0 0;font-size:0.72rem;white-space:pre-wrap;">${escHtml(inputStr.length > 500 ? inputStr.slice(0, 500) + '…' : inputStr)}</pre></div>`;
      }
      if (block.type === 'tool_result') {
        const inner = renderContent(block.content);
        return `<div class="msg-tool-use" style="background:#f0fdf4;border-left:2px solid #22c55e;"><strong>${T('logs_tool_result_label')}</strong>${inner}</div>`;
      }
      return '';
    }).join('');
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  document.addEventListener('i18nLoaded', loadList);
</script>
